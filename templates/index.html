<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ReClip — Free Media Downloader</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f1eb;
      --fg: #3a3a38;
      --accent: #e85d2a;
      --accent-hover: #d04e1f;
      --muted: #9c9889;
      --card: #fff;
      --card-border: #e2ded6;
      --success: #2d8a4e;
      --error: #c43d3d;
      --radius: 14px;
      --shimmer: linear-gradient(90deg, #ebe8e2 25%, #f0ede7 50%, #ebe8e2 75%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Mono', monospace;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      opacity: 0.03;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      background-size: 128px;
    }

    .page {
      max-width: 620px;
      margin: 0 auto;
      padding: 60px 24px 80px;
    }

    .brand { margin-bottom: 48px; }
    .brand h1 {
      font-family: 'Instrument Serif', serif;
      font-size: 4.2rem;
      font-weight: 400;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--fg);
    }
    .brand h1 em { font-style: italic; color: var(--accent); }
    .brand p {
      margin-top: 10px;
      font-size: 0.78rem;
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    textarea {
      width: 100%;
      padding: 18px 20px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      color: var(--fg);
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem;
      outline: none;
      resize: none;
      min-height: 56px;
      transition: border-color 0.25s, box-shadow 0.25s;
      margin-bottom: 6px;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 93, 42, 0.08);
    }
    textarea::placeholder { color: var(--muted); }

    .hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-bottom: 20px;
      letter-spacing: 0.02em;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
      align-items: center;
    }
    .pill-group {
      display: flex;
      border: 1.5px solid var(--card-border);
      border-radius: 10px;
      overflow: hidden;
      background: var(--card);
    }
    .pill {
      padding: 9px 18px;
      font-family: 'DM Mono', monospace;
      font-size: 0.76rem;
      border: none;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .pill.active { background: var(--fg); color: var(--bg); }
    .pill:not(.active):hover { color: var(--fg); }

    .fetch-btn {
      flex: 1;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .fetch-btn:hover { background: var(--accent-hover); }
    .fetch-btn:active { transform: scale(0.98); }
    .fetch-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Cards */
    .cards { margin-top: 24px; }

    .card {
      display: flex;
      gap: 14px;
      border: 1.5px solid var(--card-border);
      border-radius: var(--radius);
      background: var(--card);
      padding: 14px;
      margin-bottom: 10px;
      animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-thumb {
      width: 120px;
      min-width: 120px;
      height: 80px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--card-border);
      flex-shrink: 0;
      position: relative;
    }
    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    /* No-thumbnail icon */
    .card-thumb .no-thumb {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
    .card-thumb .no-thumb svg {
      width: 28px;
      height: 28px;
      opacity: 0.5;
    }

    /* Shimmer skeleton for loading state */
    .card-thumb.loading {
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    .skeleton-line {
      height: 12px;
      border-radius: 4px;
      background: var(--shimmer);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin-bottom: 6px;
    }
    .skeleton-line.short { width: 40%; height: 10px; }
    .skeleton-line.medium { width: 75%; }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .card-body {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 1rem;
      line-height: 1.3;
      color: var(--fg);
      margin-bottom: 2px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .card-meta {
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
    }

    .card-dl-btn {
      padding: 6px 14px;
      border: none;
      border-radius: 7px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .card-dl-btn:hover { background: #2d2d2a; }
    .card-dl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .card-dl-btn.done { background: var(--success); color: #fff; }
    .card-dl-btn.error { background: var(--error); color: #fff; }

    .card-status {
      font-size: 0.68rem;
      color: var(--muted);
    }
    .card-status.downloading { color: var(--accent); }
    .card-status.done { color: var(--success); }
    .card-status.error { color: var(--error); }

    .q-chip {
      padding: 4px 10px;
      border: 1.5px solid var(--card-border);
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .q-chip.active {
      border-color: var(--fg);
      color: var(--fg);
      background: rgba(26,26,24,0.04);
    }
    .q-chip:hover:not(.active) { border-color: var(--muted); }

    /* Error card */
    .card.card-error {
      border-color: rgba(196, 61, 61, 0.2);
      background: rgba(196, 61, 61, 0.03);
    }
    .card-error-icon {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(196, 61, 61, 0.08);
      color: var(--error);
    }
    .card-error-icon svg {
      width: 24px;
      height: 24px;
    }
    .card-error-msg {
      font-size: 0.72rem;
      color: var(--error);
      margin-top: 2px;
      line-height: 1.4;
      max-height: 80px;
      overflow-y: auto;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .card-error-url {
      font-size: 0.65rem;
      color: var(--muted);
      word-break: break-all;
      margin-top: 4px;
    }

    /* Download all bar */
    .dl-all-bar {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .dl-all-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: var(--fg);
      color: var(--bg);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .dl-all-btn:hover { background: #2d2d2a; }
    .dl-all-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spin {
      display: inline-block;
      width: 10px; height: 10px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .footer {
      margin-top: 48px;
      text-align: center;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      line-height: 1.8;
    }

    /* Mobile */
    @media (max-width: 500px) {
      .brand h1 { font-size: 3rem; }
      .page { padding: 40px 16px 60px; }
      .card { flex-direction: column; gap: 10px; }
      .card-thumb {
        width: 100%;
        min-width: unset;
        height: 160px;
      }
      .card-title { white-space: normal; }
      .controls { flex-wrap: wrap; }
      .fetch-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="brand">
      <h1>Re<em>Clip</em></h1>
      <p>Free media downloader</p>
    </div>

    <textarea id="urls" placeholder="Paste one or more URLs..." rows="2"></textarea>
    <p class="hint">Multiple links? Separate with spaces, commas, or newlines.</p>

    <div class="controls">
      <div class="pill-group">
        <button class="pill active" data-format="video" onclick="setFormat(this)">MP4</button>
        <button class="pill" data-format="audio" onclick="setFormat(this)">MP3</button>
      </div>
      <button class="fetch-btn" id="goBtn" onclick="go()">Fetch</button>
    </div>

    <div id="cards" class="cards"></div>

    <!-- Cookie Manager Section -->
    <div class="cookie-section" id="cookieSection" style="margin-top: 30px; display: none; border-top: 1.5px solid var(--card-border); padding-top: 20px;">
      <h3 style="font-size: 0.8rem; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--fg); font-weight: 500;">Update Platform Cookies</h3>
      <input type="text" id="cookieToken" placeholder="Enter security token (optional)..." style="width: 100%; padding: 12px 16px; border: 1.5px solid var(--card-border); border-radius: var(--radius); font-family: 'DM Mono', monospace; font-size: 0.78rem; margin-bottom: 8px; outline: none; background: var(--card); color: var(--fg); transition: border-color 0.25s;" />
      <textarea id="cookieContent" placeholder="Paste Netscape format cookies here..." rows="4" style="font-size: 0.78rem; margin-bottom: 8px; min-height: 100px;"></textarea>
      <div style="display: flex; gap: 8px; align-items: center;">
        <select id="cookiePlatform" style="padding: 10px 14px; border: 1.5px solid var(--card-border); border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 0.78rem; background: var(--card); color: var(--fg); outline: none;">
          <option value="youtube">YouTube</option>
          <option value="instagram">Instagram</option>
          <option value="facebook">Facebook</option>
        </select>
        <button class="card-dl-btn" onclick="saveCookiesFromServer()" id="saveCookieBtn" style="padding: 10px 18px; font-size: 0.76rem;">Save Cookies</button>
      </div>
      <p id="cookieStatusMsg" style="font-size: 0.72rem; margin-top: 10px; font-weight: 500;"></p>
    </div>

    <div style="margin-top: 30px; text-align: center; margin-bottom: 10px;">
      <button class="q-chip" onclick="toggleCookieSection()" style="font-size: 0.68rem; padding: 6px 12px;">Toggle Cookie Manager</button>
    </div>

    <div class="footer">
      YouTube &middot; TikTok &middot; Instagram &middot; Twitter/X &middot; Reddit &middot; Facebook<br>
      Vimeo &middot; Twitch &middot; Dailymotion &middot; SoundCloud &middot; Loom &middot; Streamable<br>
      Pinterest &middot; Tumblr &middot; Threads &middot; LinkedIn &middot; 1000+ more
    </div>
  </div>

  <script>
    let currentFormat = 'video';
    let cardData = [];

    function setFormat(btn) {
      document.querySelectorAll('.pill').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentFormat = btn.dataset.format;
    }

    function parseUrls(text) {
      return [...new Set(text.split(/[\s,]+/).map(u => u.trim()).filter(u => u.startsWith('http')))];
    }

    function fmtDur(s) {
      if (!s) return '';
      const m = Math.floor(s / 60);
      const sec = Math.floor(s % 60);
      return `${m}:${sec.toString().padStart(2, '0')}`;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    async function readJsonOrError(res) {
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch {
        if (!res.ok) {
          return { error: `Server error (${res.status})` };
        }
        return { error: 'Server returned an invalid response' };
      }
    }

    function friendlyError(err) {
      if (err.includes('Unsupported URL')) return 'This URL is not supported';
      if (err.includes('Video unavailable')) return 'Video is unavailable or private';
      if (err.includes('Private video')) return 'This video is private';
      if (err.includes('HTTP Error 403')) return 'Access denied by the platform';
      if (err.includes('HTTP Error 404')) return 'Video not found';
      if (err.includes('copyright')) return 'Video blocked due to copyright';
      if (err.includes('geo')) return 'Video not available in your region';
      if (err.includes('timed out') || err.includes('Timed out')) return 'Request timed out — try again';
      if (err.includes('network') || err.includes('Network')) return 'Network error — check your connection';
      if (err.includes('cookies are no longer valid') || err.includes('rotated'))
        return '⚠️ YouTube cookies have expired — please re-export cookies from your browser and update the cookies/youtube.txt file.';
      if (err.includes('429') || err.includes('Too Many Requests'))
        return '⚠️ YouTube is rate-limiting this server\'s IP. Try again in a few minutes.';
      if (err.includes('Sign in to confirm') || err.includes('not a bot'))
        return '⚠️ YouTube is blocking this server\'s IP. Your cookies may be expired — re-export fresh cookies from your browser.';
      return err;
    }

    document.getElementById('urls').addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); go(); }
    });

    function checkEnableGoButton() {
      const btn = document.getElementById('goBtn');
      const isAnyLoading = cardData.some(c => c.status === 'loading' || c.status === 'fetching_info' || c.status === 'downloading');
      btn.disabled = isAnyLoading;
      btn.textContent = isAnyLoading ? 'Loading...' : 'Fetch';
    }

    async function go() {
      const urls = parseUrls(document.getElementById('urls').value);
      if (!urls.length) return;

      const btn = document.getElementById('goBtn');
      const container = document.getElementById('cards');
      btn.disabled = true;
      btn.textContent = 'Loading...';
      container.innerHTML = '';
      cardData = [];

      for (let i = 0; i < urls.length; i++) {
        const url = urls[i];
        const idx = cardData.length;
        cardData.push({ url, status: 'loading' });
        renderCard(idx);

        try {
          const res = await fetch('/api/info', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ url }),
          });
          const data = await readJsonOrError(res);
          if (data.error) {
            cardData[idx] = { ...cardData[idx], status: 'info-error', error: data.error };
            renderCard(idx);
          } else if (data.status === 'info_ready') {
            cardData[idx] = {
              ...cardData[idx],
              status: 'ready',
              title: data.info.title || '',
              thumbnail: data.info.thumbnail || '',
              duration: data.info.duration,
              uploader: data.info.uploader || '',
              formats: data.info.formats || [],
              selectedFormatId: data.info.formats?.[0]?.id || null,
            };
            renderCard(idx);
          } else {
            cardData[idx].status = 'fetching_info';
            cardData[idx].jobId = data.job_id;
            pollInfoJob(idx, data.job_id);
          }
        } catch (err) {
          cardData[idx] = { ...cardData[idx], status: 'info-error', error: err.message };
          renderCard(idx);
        }
      }
      checkEnableGoButton();
    }

    function pollInfoJob(idx, jobId) {
      const c = cardData[idx];
      const iv = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${jobId}`);
          const data = await readJsonOrError(res);
          if (data.status === 'info_ready') {
            clearInterval(iv);
            cardData[idx] = {
              ...cardData[idx],
              status: 'ready',
              title: data.info.title || '',
              thumbnail: data.info.thumbnail || '',
              duration: data.info.duration,
              uploader: data.info.uploader || '',
              formats: data.info.formats || [],
              selectedFormatId: data.info.formats?.[0]?.id || null,
            };
            renderCard(idx);
            checkEnableGoButton();
          } else if (data.status === 'error') {
            clearInterval(iv);
            cardData[idx] = { ...cardData[idx], status: 'info-error', error: data.error };
            renderCard(idx);
            checkEnableGoButton();
          }
        } catch {
          clearInterval(iv);
          cardData[idx] = { ...cardData[idx], status: 'info-error', error: 'Lost connection to server' };
          renderCard(idx);
          checkEnableGoButton();
        }
      }, 1000);
    }

    function renderCard(idx) {
      const c = cardData[idx];
      let el = document.getElementById(`card-${idx}`);
      if (!el) {
        el = document.createElement('div');
        el.id = `card-${idx}`;
        el.className = 'card';
        document.getElementById('cards').appendChild(el);
      }

      // Loading skeleton
      if (c.status === 'loading' || c.status === 'fetching_info') {
        el.className = 'card';
        el.innerHTML = `
          <div class="card-thumb loading"></div>
          <div class="card-body">
            <div class="skeleton-line medium"></div>
            <div class="skeleton-line short"></div>
          </div>
        `;
        return;
      }

      // Error state
      if (c.status === 'info-error') {
        el.className = 'card card-error';
        el.innerHTML = `
          <div class="card-thumb">
            <div class="card-error-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title" style="color:var(--error)">Could not fetch video</div>
            <div class="card-error-msg">${esc(friendlyError(c.error || ''))}</div>
            <div class="card-error-url">${esc(c.url)}</div>
            <div class="card-actions" style="margin-top:10px">
              <button class="card-dl-btn" onclick="dlFromError(${idx})">Try direct download</button>
            </div>
          </div>
        `;
        return;
      }

      // Ready / downloading / done / error states
      el.className = 'card';
      const isAudio = currentFormat === 'audio';

      let thumbHtml;
      if (isAudio) {
        thumbHtml = `<div class="no-thumb" style="color:var(--accent)"><svg viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>`;
      } else if (c.thumbnail) {
        thumbHtml = `<img src="${c.thumbnail}" alt="">`;
      } else {
        thumbHtml = `<div class="no-thumb"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="8" cy="8" r="1.5"/><path d="m21 15-5-5L5 21"/></svg></div>`;
      }

      let qualityChips = '';
      if (!isAudio && c.formats && c.formats.length >= 1) {
        qualityChips = c.formats.map(f =>
          `<button class="q-chip${f.id === c.selectedFormatId ? ' active' : ''}" onclick="pickFormat(${idx}, '${f.id}')">${f.label}</button>`
        ).join('');
      }

      let actionHtml = '';
      if (c.status === 'ready') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Download</button>${qualityChips}`;
      } else if (c.status === 'downloading') {
        actionHtml = `<span class="card-status downloading"><span class="spin"></span> Downloading...</span>`;
      } else if (c.status === 'done') {
        actionHtml = `<button class="card-dl-btn done" onclick="saveCard(${idx})">Save</button>
          <span class="card-status done">${esc(c.filename || '')}</span>`;
      } else if (c.status === 'error') {
        actionHtml = `<button class="card-dl-btn" onclick="dlCard(${idx})">Retry</button>
          <span class="card-status error">${esc(friendlyError(c.error || 'Download failed'))}</span>`;
      }

      el.innerHTML = `
        <div class="card-thumb">${thumbHtml}</div>
        <div class="card-body">
          <div class="card-title">${esc(c.title || 'Untitled')}</div>
          <div class="card-meta">${esc(c.uploader)}${c.duration ? ' · ' + fmtDur(c.duration) : ''}</div>
          <div class="card-actions">${actionHtml}</div>
        </div>
      `;
    }

    function renderDownloadAll() {
      const existing = document.getElementById('dl-all-bar');
      if (existing) existing.remove();

      const bar = document.createElement('div');
      bar.id = 'dl-all-bar';
      bar.className = 'dl-all-bar';
      bar.innerHTML = `<button class="dl-all-btn" onclick="dlAll()">Download All</button>`;
      document.getElementById('cards').appendChild(bar);
    }

    function pickFormat(idx, formatId) {
      cardData[idx].selectedFormatId = formatId;
      renderCard(idx);
    }

    async function dlCard(idx) {
      const c = cardData[idx];
      c.status = 'downloading';
      c.error = null;
      renderCard(idx);

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: c.url,
            format: currentFormat,
            format_id: c.selectedFormatId,
            title: c.title || '',
          }),
        });
        const data = await readJsonOrError(res);
        if (data.error) {
          c.status = 'error';
          c.error = data.error;
          renderCard(idx);
          return;
        }
        c.jobId = data.job_id;
        pollCard(idx);
      } catch (err) {
        c.status = 'error';
        c.error = err.message;
        renderCard(idx);
      }
    }

    async function dlFromError(idx) {
      const c = cardData[idx];
      c.status = 'downloading';
      c.error = null;
      renderCard(idx);

      try {
        const res = await fetch('/api/download', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            url: c.url,
            format: currentFormat,
            format_id: null,
            title: '',
          }),
        });
        const data = await readJsonOrError(res);
        if (data.error) {
          c.status = 'error';
          c.error = data.error;
          renderCard(idx);
          return;
        }
        c.jobId = data.job_id;
        pollCard(idx);
      } catch (err) {
        c.status = 'error';
        c.error = err.message;
        renderCard(idx);
      }
    }

    function pollCard(idx) {
      const c = cardData[idx];
      const iv = setInterval(async () => {
        try {
          const res = await fetch(`/api/status/${c.jobId}`);
          const data = await readJsonOrError(res);
          if (data.status === 'done') {
            clearInterval(iv);
            c.status = 'done';
            c.filename = data.filename;
            renderCard(idx);
            saveCard(idx);
          } else if (data.status === 'error') {
            clearInterval(iv);
            c.status = 'error';
            c.error = data.error;
            renderCard(idx);
          }
        } catch {
          clearInterval(iv);
          c.status = 'error';
          c.error = 'Lost connection to server';
          renderCard(idx);
        }
      }, 1000);
    }

    function saveCard(idx) {
      const c = cardData[idx];
      if (!c.jobId) return;
      const a = document.createElement('a');
      a.href = `/api/file/${c.jobId}`;
      a.download = c.filename || '';
      a.click();
    }

    async function dlAll() {
      const btn = document.querySelector('.dl-all-btn');
      if (btn) { btn.disabled = true; btn.textContent = 'Downloading...'; }

      for (let i = 0; i < cardData.length; i++) {
        if (cardData[i].status === 'ready') {
          await dlCard(i);
        }
      }

      if (btn) { btn.disabled = false; btn.textContent = 'Download All'; }
    }

    function toggleCookieSection() {
      const sec = document.getElementById('cookieSection');
      sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
      if (sec.style.display === 'block') {
        sec.scrollIntoView({ behavior: 'smooth' });
      }
    }

    async function saveCookiesFromServer() {
      const token = document.getElementById('cookieToken').value.trim();
      const cookies = document.getElementById('cookieContent').value;
      const platform = document.getElementById('cookiePlatform').value;
      const btn = document.getElementById('saveCookieBtn');
      const status = document.getElementById('cookieStatusMsg');

      if (!cookies.trim()) {
        status.style.color = 'var(--error)';
        status.textContent = 'Please paste cookie content first.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving...';
      status.textContent = '';

      try {
        const res = await fetch('/api/cookies/update', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, cookies, platform })
        });
        const data = await readJsonOrError(res);
        if (data.error) {
          status.style.color = 'var(--error)';
          status.textContent = data.error;
        } else {
          status.style.color = 'var(--success)';
          status.textContent = data.message;
          document.getElementById('cookieContent').value = '';
        }
      } catch (err) {
        status.style.color = 'var(--error)';
        status.textContent = err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = 'Save Cookies';
      }
    }
  </script>
</body>
</html>
